services:
  postgres:
    image: postgres:16-alpine
    container_name: eburon-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: eburon
      POSTGRES_PASSWORD: eburon
      POSTGRES_DB: eburon
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
