{
  "appId": "dev.eburon.codebox",
  "productName": "Eburon CodeBox",
  "directories": {
    "output": "release"
  },
  "files": [
    "dist/**/*",
    "dist-electron/**/*"
  ],
  "mac": {
    "category": "public.app-category.developer-tools",
    "target": ["dmg", "zip"],
    "icon": "public/icon.png",
    "hardenedRuntime": true,
    "entitlements": "build/entitlements.mac.plist"
  },
  "win": {
    "target": ["nsis"],
    "icon": "public/icon.png"
  },
  "linux": {
    "target": ["AppImage", "deb"],
    "category": "Development",
    "icon": "public/icon.png"
  },
  "deb": {
    "packageName": "eburon-codebox",
    "artifactName": "eburon-codebox-${version}_${arch}.deb"
  },
  "nsis": {
    "oneClick": false,
    "allowToChangeInstallationDirectory": true
  },
  "publish": {
    "provider": "github",
    "owner": "eburon",
    "repo": "codebox"
  }
}
